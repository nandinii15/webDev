<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry Form</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }
    .form-container {
      background: #c9d7df;
      border-radius: 12px;
      padding: 40px;
      max-width: 900px;
      margin: 40px auto;
    }
    .form-control, .form-select {
      border-radius: 8px;
      height: 45px;
    }
    textarea.form-control {
      height: auto;
    }
    .btn-custom {
      background-color: #0c2233;
      color: #fff;
      border-radius: 25px;
      padding: 10px 30px;
    }
    .btn-custom:hover {
      background-color: #061520;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="form-container shadow-sm">
    
    <h2 class="text-center fw-bold">Enquiry Form</h2>
    <p class="text-center text-muted mb-4">
      Have questions or need assistance? Fill out the form below to connect with our team and explore your opportunities.
    </p>

    <form>
      <div class="row g-3">

        <!-- Name -->
        <div class="col-md-6">
          <label class="form-label">Person Name*</label>
          <input type="text" class="form-control" placeholder="Person Name">
        </div>

        <!-- Contact -->
        <div class="col-md-6">
          <label class="form-label">Contact Number*</label>
          <input type="text" class="form-control" placeholder="Contact Number">
        </div>

        <!-- Email -->
        <div class="col-md-8">
          <label class="form-label">Email*</label>
          <input type="email" class="form-control" placeholder="Email">
        </div>

        <!-- Qualification -->
        <div class="col-md-4">
          <label class="form-label">Qualification*</label>
          <input type="text" class="form-control" placeholder="Qualification">
        </div>

        <!-- College -->
        <div class="col-12">
          <label class="form-label">College/School Name*</label>
          <input type="text" class="form-control" placeholder="College/School Name">
        </div>

        <!-- Year -->
        <div class="col-md-6">
          <label class="form-label">Year*</label>
          <select class="form-select">
            <option selected disabled>Year</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
          </select>
        </div>

        <!-- Branch -->
        <div class="col-md-6">
          <label class="form-label">Branch*</label>
          <input type="text" class="form-control" placeholder="Branch">
        </div>

        <!-- Courses -->
        <div class="col-md-6">
          <label class="form-label">Interested in Which Course*</label>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Full Stack Web Development - Placement Oriented</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Data Science with Python - Placement Oriented</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Data Analytics with Python - Placement Oriented</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Business Analyst</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Java Programming</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Python Programming</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">C/C++ Programming</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Other</label>
          </div>
        </div>

        <!-- Right side dropdowns -->
        <div class="col-md-6">
          <label class="form-label">
            Source of Information 
            <small class="text-muted d-block">(Only choose 'Received call from institute' if you actually got a call from us)</small>
          </label>
          <select class="form-select mb-3">
            <option selected disabled>Source of Information</option>
            <option>Instagram</option>
            <option>Website</option>
            <option>Friend</option>
            <option>Received call from institute</option>
          </select>

          <label class="form-label">Name of Executive*</label>
          <select class="form-select">
            <option selected disabled>Name of Executive</option>
            <option>Executive 1</option>
            <option>Executive 2</option>
          </select>
        </div>

      </div>

      <!-- Submit -->
      <div class="text-center mt-4">
        <button type="submit" class="btn btn-custom">Submit</button>
      </div>

    </form>
  </div>
</div>

</body>
</html>
