<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Coaching Registration Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <div class="container py-5">
      <div class="card shadow-lg border-0 main-card">
        <div class="header-box text-center">
          <h1>
            <i class="bi bi-mortarboard-fill"></i>
            Coaching Institute Registration
          </h1>
          <p class="mb-0 mt-2">Fill in your details to complete registration</p>
        </div>

        <div class="card-body p-4 p-md-5">
          <div class="form-section">
            <h3 class="section-title">
              <i class="bi bi-person-circle"></i>
              Personal Information
            </h3>
            <br />
            <div class="row g-4 container border shadow rounded-3 py-4">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="fullName"
                  placeholder="Enter your full name"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label">Contact Number</label>
                <input
                  type="tel"
                  class="form-control"
                  id="phone"
                  placeholder="Enter contact number"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="Enter your email"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" id="dob" />
              </div>

              <div class="col-12">
                <label class="form-label d-block">Gender</label>

                <div class="d-flex flex-wrap gap-4">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="gender"
                      id="male"
                    />
                    <label class="form-check-label" for="male"> Male </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="gender"
                      id="female"
                    />
                    <label class="form-check-label" for="female">
                      Female
                    </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="gender"
                      id="other"
                    />
                    <label class="form-check-label" for="other"> Other </label>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <br />
          <div class="form-section">
            <h3 class="section-title">
              <i class="bi bi-journal-bookmark-fill"></i>
              Academic Details
            </h3>
            <br />
            <div class="row g-4 container shadow border rounded-3 py-4">
              <div class="col-md-6">
                <label class="form-label">Qualification</label>

                <select class="form-select" id="qualification">
                  <option selected disabled>Select qualification</option>

                  <option>10th</option>
                  <option>12th</option>
                  <option>Diploma</option>
                  <option>Graduate</option>
                  <option>Postgraduate</option>
                  <option>PhD</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">
                  Last Qualification Percentage / Grade
                </label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter percentage or grade"
                />
              </div>
            </div>
          </div>
          <br />

          <div class="form-section">
            <h4 class="section-title">
              <i class="bi bi-book-half"></i>
              Course Information
            </h4>
            <br />
            <div class="row g-4 container shadow border rounded-3">
              <div class="col-md-6">
                <label class="form-label">Preferred Course</label>

                <select class="form-select">
                  <option selected disabled>Select course</option>

                  <option>IIT-JEE</option>
                  <option>NEET</option>
                  <option>Banking Exams</option>
                  <option>UPSC</option>
                </select>
              </div>

              <div class="col-md-6 py-4">
                <label class="form-label d-block">
                  Batch Timing Preference
                </label>

                <div class="d-flex flex-wrap gap-3 mt-2">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="batch"
                      id="morning"
                    />

                    <label class="form-check-label" for="morning">
                      Morning
                    </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="batch"
                      id="afternoon"
                    />

                    <label class="form-check-label" for="afternoon">
                      Afternoon
                    </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="batch"
                      id="evening"
                    />

                    <label class="form-check-label" for="evening">
                      Evening
                    </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="batch"
                      id="weekend"
                    />

                    <label class="form-check-label" for="weekend">
                      Weekend
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <br />

          <div class="form-section">
            <h4 class="section-title">
              <i class="bi bi-geo-alt-fill"></i>
              Address
            </h4>
            <br />
            <div class="row g-4 container shadow border rounded-3 py-4">
              <div class="col-12">
                <label class="form-label">Residential Address</label>

                <textarea
                  class="form-control"
                  rows="3"
                  placeholder="Enter your address"
                ></textarea>
              </div>

              <div class="col-md-6">
                <label class="form-label">City</label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter city"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label">Pin Code</label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter pin code"
                />
              </div>
            </div>
          </div>
          <br />

          <div class="form-section">
            <h3 class="section-title">
              <i class="bi bi-people-fill"></i>
              Guardian Details
            </h3>
            <br />

            <div class="row g-4 container shadow border rounded-3 py-4">
              <div class="col-md-6">
                <label class="form-label"> Guardian's Full Name </label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter guardian's name"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label"> Guardian's Contact Number </label>

                <input
                  type="tel"
                  class="form-control"
                  placeholder="Enter guardian's number"
                />
              </div>
            </div>
          </div>
          <br />

          <div class="form-section">
            <h3 class="section-title">
              <i class="bi bi-chat-left-text-fill"></i>
              Additional Information
            </h3>
            <br />
            <div class="row g-4 container shadow border rounded-3">
              <div class="col-md-6 p-2">
                <label class="form-label"> How did you hear about us? </label>

                <select class="form-select">
                  <option selected disabled>Choose an option</option>

                  <option>Friends</option>
                  <option>Online Ad</option>
                  <option>Newspaper</option>
                  <option>Social Media</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="col-12 p-2">
                <label class="form-label"> Special Requirements </label>

                <textarea
                  class="form-control p-2"
                  rows="4"
                  placeholder="Mention any special requirements..."
                ></textarea>
              </div>
            </div>
          </div>

          <div class="text-center mt-4">
            <button class="btn btn-submit container border">
              <i class="bi bi-send-fill"></i>
              Submit Registration
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
