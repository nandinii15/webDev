<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weather App</title>

 
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

 
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: url("image.png") no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
      }

      .weather-card {
        width: 400px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 20px;
        backdrop-filter: blur(5px);
      }

      .weather-card h2,
      .weather-card h3,
      .weather-card h1,
      .weather-card p {
        color: #000;
      }

      #temp {
        font-size: 60px;
        font-weight: bold;
      }

      #condition {
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card weather-card p-4 shadow-lg text-center">
        <!-- Heading -->
        <h2 class="mb-4">
          <i class="bi bi-cloud-sun-fill text-primary"></i>
          Weather App
        </h2>

        <!-- Input -->
        <div class="mb-3">
          <input
            type="text"
            id="cityName"
            class="form-control"
            placeholder="Enter city name"
          />
        </div>

        <!-- Button -->
        <button class="btn btn-primary w-100" onclick="getWeather()">
          Get Weather
        </button>

        <!-- Weather Data -->
        <div class="mt-4">
          <h3 id="city">City Name</h3>

          <h1 id="temp">0 °C</h1>

          <p id="condition">Weather Condition</p>
        </div>
      </div>
    </div>

    <!-- Script File -->
    <script src="script.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
