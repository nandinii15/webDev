<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<title>Login Register Bootstrap</title>
 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 
 
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
 
</head>
 
<body class="bg-primary">
 
<div class="container vh-100 d-flex align-items-end justify-content-center pb-5">
 
<div class="row g-5">
 
 
<div class="col-md-6 ">
 
<div class="card p-5 rounded-4 bg-light" style="min-width: 380px;">
 
<h3 class="mb-4">
<u>Lo</u>gin
</h3>
 
 
<div class="input-group mb-3 border-bottom">
 
<span class="input-group-text bg-transparent border-0">
<i class="bi bi-envelope"></i>
</span>
 
<input type="email"
class="form-control border-0"
placeholder="Enter your email">
 
</div>
 
 
<div class="input-group mb-3 border-bottom">
 
<span class="input-group-text bg-transparent border-0">
<i class="bi bi-lock"></i>
</span>
 
<input type="password"
class="form-control border-0"
placeholder="Enter password">
 
<span class="input-group-text bg-transparent border-0">
<i class="bi bi-eye"></i>
</span>
 
</div>
 
 
<div class="d-flex justify-content-between mb-3">
 
<div>
<input type="checkbox">
<span> Remember me</span>
</div>
 
<a href="#" class="text-decoration-none">
Forget password
</a>
 
</div>
 
 
<button class="btn btn-primary w-100 mb-3">
Login
</button>
 
 
<p class="text-center mb-0">
Don't have an account?
<a href="#">Signup now</a>
</p>
 
</div>
 
</div>
 
 
 
 
<div class="col-md-6">
 
<div class="card p-5 rounded-4 bg-light" style="min-width: 380px;">
 
<h3 class="mb-4">
<u>Re</u>gister
</h3>
 
 
<div class="input-group mb-3 border-bottom">
 
<span class="input-group-text bg-transparent border-0">
<i class="bi bi-person"></i>
</span>
 
<input type="text"
class="form-control border-0"
placeholder="Enter your name">
 
</div>
 
 
<div class="input-group mb-3 border-bottom">
 
<span class="input-group-text bg-transparent border-0">
<i class="bi bi-envelope"></i>
</span>
 
<input type="email"
class="form-control border-0"
placeholder="Enter email">
 
</div>
 
 
<div class="input-group mb-3 border-bottom">
 
<span class="input-group-text bg-transparent border-0">
<i class="bi bi-lock"></i>
</span>
 
<input type="password"
class="form-control border-0"
placeholder="Create password">
 
<span class="input-group-text mbg-transparent border-0">
<i class="bi bi-eye"></i>
</span>
 
</div>
 
 
<div class="mb-3">
 
<input type="checkbox">
<span> I accept all terms & condition</span>
 
</div>
 
<button class="btn btn-primary w-100 mb-3">
Register now
</button>
 
 
<p class="text-center mb-0">
Already have an account?
<a href="#">Login now</a>
</p>
 
</div>
 
</div>
 
</div>
 
</div>
 
</body>
</html>
