<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>
    <link rel="stylesheet" href="task2.css">
</head>
<body>
    <div class="container">
        <h1>Enquiry Form</h1>
        <p>Have questions or need assistance? Fill out the form below to connect with our team and explore your opportunities.</p>

        <div class="form-row">
            <div class="form-group">
                <label>Person Name*</label>
                <input type="text" placeholder="Person Name">
            </div>
            <div class="form-group">
                <label>Contact Number*</label>
                <input type="text" placeholder="Contact Number">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email*</label>
                <input type="email" placeholder="Email">
            </div>
            <div class="form-group">
                <label>Qualification*</label>
                <input type="text" placeholder="Qualification">
            </div>
        </div>

        <div class="form-group">
            <label>College/School Name*</label>
            <input type="text" placeholder="College/School Name">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Year*</label>
                <select>
                    <option>Year</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                    <option>Passout</option>
                </select>
            </div>
            <div class="form-group">
                <label>Branch*</label>
                <input type="text" placeholder="Branch">
            </div>
        </div>

        <div class="form-group">
            <label>Interested in Which Course*</label>
            <div class="checkbox-group">
                <label><input type="checkbox"> Full Stack Web Development - Placement Oriented</label>
                <label><input type="checkbox"> Data Science with Python - Placement Oriented</label>
                <label><input type="checkbox"> Data Analytics with Python - Placement Oriented</label>
                <label><input type="checkbox"> Business Analyst</label>
                <label><input type="checkbox"> Java Programming</label>
                <label><input type="checkbox"> Python Programming</label>
                <label><input type="checkbox"> C/C++ Programming</label>
                <label><input type="checkbox"> Other</label>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Source of Information*</label>
                <select>
                    <option>Source of Information</option>
                    <option>Google</option>
                    <option>Instagram</option>
                    <option>Facebook</option>
                    <option>Friend / Relative</option>
                    <option>Received call from institute</option>
                </select>
                <small class="note">
                    Only choose "Received call from institute" if you actually got a call from us.
                </small>
            </div>
            <div class="form-group">
                <label>Name of Executive*</label>
                <select>
                    <option>Name of Executive</option>
                    <option>Executive 1</option>
                    <option>Executive 2</option>
                    <option>Executive 3</option>
                </select>
            </div>
        </div>

        <div class="btn-wrapper">
            <div class="submit-btn">Submit</div>
        </div>
    </div>
</body>
</html>
